<!DOCTYPE html>
<html lang="en">
<head>
    <title>Caesar Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-4">
        <table class="table">
            <tr><td style="text-align: center; font-weight: bold; font-size: 25px;">CAESAR CIPHER</td></tr>
            
            <tr><td style="font-weight: bold; color: blue">ENCRYPTION</td></tr>
            <tr>
                <td>
                    <form method="POST" action="/encrypt">
                        <div class="mb-3">
                            <label class="form-label">Plain text:</label>
                            <input type="text" class="form-control" name="inputPlainText" value="{{ text_encrypt or '' }}" placeholder="Input Plain Text" required autofocus/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input type="number" class="form-control" name="inputKeyPlain" value="{{ key_encrypt or '' }}" placeholder="Input Key" required/>
                        </div>
                        <button type="submit" class="btn btn-primary">Encrypt</button>
                    </form>
                    
                    {% if encrypted_text %}
                    <div class="mt-3 p-3 bg-light border rounded font-weight-bold">
                        text: {{ text_encrypt }}<br/>
                        key: {{ key_encrypt }}<br/>
                        encrypted text: <span class="text-danger">{{ encrypted_text }}</span>
                    </div>
                    {% endif %}
                </td>
            </tr>
            
            <tr><td style="font-weight: bold; color: blue">DECRYPTION</td></tr>
            <tr>
                <td>
                    <form method="POST" action="/decrypt">
                        <div class="mb-3">
                            <label class="form-label">Cipher text:</label>
                            <input type="text" class="form-control" name="inputCipherText" value="{{ text_decrypt or '' }}" placeholder="Input Cipher Text" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input type="number" class="form-control" name="inputKeyCipher" value="{{ key_decrypt or '' }}" placeholder="Input Key" required/>
                        </div>
                        <button type="submit" class="btn btn-success">Decrypt</button>
                    </form>
                    
                    {% if decrypted_text %}
                    <div class="mt-3 p-3 bg-light border rounded font-weight-bold">
                        text: {{ text_decrypt }}<br/>
                        key: {{ key_decrypt }}<br/>
                        decrypted text: <span class="text-success">{{ decrypted_text }}</span>
                    </div>
                    {% endif %}
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
