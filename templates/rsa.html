<!DOCTYPE html>
<html lang="en">
<head>
    <title>RSA Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-4">
        <table class="table">
            <tr><td style="text-align: center; font-weight: bold; font-size: 25px;">RSA CIPHER</td></tr>
            
            <tr><td style="font-weight: bold; color: blue">ENCRYPTION</td></tr>
            <tr>
                <td>
                    <form method="POST" action="/rsa/encrypt">
                        <div class="mb-3">
                            <label class="form-label">Plain text (Số nguyên):</label>
                            <input type="number" class="form-control" name="inputPlainText" value="{{ text_encrypt or '' }}" placeholder="Nhập số nguyên cần mã hóa (Ví dụ: 88)" required autofocus/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Public Key (e, n) - Nhập cách nhau bằng dấu phẩy:</label>
                            <input type="text" class="form-control" name="publicKey" value="{{ pub_key or '7, 187' }}" placeholder="Ví dụ: 7, 187" required/>
                        </div>
                        <button type="submit" class="btn btn-primary">Encrypt</button>
                    </form>
                    
                    {% if encrypted_text %}
                    <div class="mt-3 p-3 bg-light border rounded font-weight-bold">
                        Văn bản gốc: {{ text_encrypt }}<br/>
                        Kết quả mã hóa (Cipher text): <span class="text-danger">{{ encrypted_text }}</span>
                    </div>
                    {% endif %}
                </td>
            </tr>
            
            <tr><td style="font-weight: bold; color: blue">DECRYPTION</td></tr>
            <tr>
                <td>
                    <form method="POST" action="/rsa/decrypt">
                        <div class="mb-3">
                            <label class="form-label">Cipher text (Số nguyên):</label>
                            <input type="number" class="form-control" name="inputCipherText" value="{{ text_decrypt or '' }}" placeholder="Nhập số nguyên cần giải mã" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Private Key (d, n) - Nhập cách nhau bằng dấu phẩy:</label>
                            <input type="text" class="form-control" name="privateKey" value="{{ priv_key or '23, 187' }}" placeholder="Ví dụ: 23, 187" required/>
                        </div>
                        <button type="submit" class="btn btn-success">Decrypt</button>
                    </form>
                    
                    {% if decrypted_text %}
                    <div class="mt-3 p-3 bg-light border rounded font-weight-bold">
                        Bản mã: {{ text_decrypt }}<br/>
                        Kết quả giải mã (Plain text): <span class="text-success">{{ decrypted_text }}</span>
                    </div>
                    {% endif %}
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
